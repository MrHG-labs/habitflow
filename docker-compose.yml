services:
  # ── Base de Datos: PostgreSQL ──
  db:
    image: postgres:15-alpine
    container_name: habitflow_db
    restart: always
    environment:
      POSTGRES_USER: habitflow_user
      POSTGRES_PASSWORD: habitflow_password
      POSTGRES_DB: habitflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitflow_user -d habitflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - habitflow_net

  # ── Backend: FastAPI + SQLModel ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habitflow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://habitflow_user:habitflow_password@db:5432/habitflow
      - SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - habitflow_net

  # ── Frontend: Next.js + React Query ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habitflow_frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
    command: npm run dev
    networks:
      - habitflow_net

networks:
  habitflow_net:
    driver: bridge

volumes:
  postgres_data:
